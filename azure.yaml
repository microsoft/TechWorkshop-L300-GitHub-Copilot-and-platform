# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: techworkshop-l300-github-copilot-and-platform
metadata:
    template: azd-init@1.22.5
services:
    src:
        project: ./src
        host: containerapp
        language: dotnet
        docker:
          path: ./Dockerfile
          context: .
          buildArgs:
            - '--builder multi-plat'
          platform: linux/amd64
          registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
resources:
    src:
        type: host.containerapp
        port: 8080

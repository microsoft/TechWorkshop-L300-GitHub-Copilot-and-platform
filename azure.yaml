# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: zavastore
metadata:
  template: zavastore-app

services:
  app:
    project: ./src
    language: csharp
    host: appservice
    docker:
      path: ./Dockerfile
      context: ./

infra:
  provider: bicep
  path: infra
  module: main

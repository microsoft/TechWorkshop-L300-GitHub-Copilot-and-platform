name: Build and Deploy to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-app.yml"
  pull_request:
    branches: ["*"]
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC federated credentials
  contents: read

env:
  IMAGE_NAME: zava-storefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push container image
        run: |
          IMAGE_TAG=${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST ./src
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ vars.WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --container-image-name ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --container-registry-url https://${{ vars.ACR_NAME }}.azurecr.io

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ vars.WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }}

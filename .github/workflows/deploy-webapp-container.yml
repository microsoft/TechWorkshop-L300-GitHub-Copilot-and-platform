name: Build and Deploy Container to App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/deploy-webapp-container.yml
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/deploy-webapp-container.yml

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: zavastorefront

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -f src/Dockerfile -t local/$IMAGE_NAME:${{ github.sha }} src

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Precheck deploy prerequisites
        id: precheck
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          can_deploy=true
          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ] || [ -z "$AZURE_CLIENT_SECRET" ] || [ -z "$ACR_NAME" ] || [ -z "$AZURE_RESOURCE_GROUP" ] || [ -z "$AZURE_WEBAPP_NAME" ]; then
            can_deploy=false
          fi
          echo "can_deploy=$can_deploy" >> "$GITHUB_OUTPUT"

      - name: Skip deploy summary
        if: ${{ steps.precheck.outputs.can_deploy != 'true' }}
        run: echo "Skipping deploy: missing Azure secrets/variables in this run context."

      - name: Azure login
        if: ${{ steps.precheck.outputs.can_deploy == 'true' }}
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ env.AZURE_CLIENT_SECRET }}

      - name: Build and push image to ACR
        if: ${{ steps.precheck.outputs.can_deploy == 'true' }}
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          az acr login --name "$ACR_NAME"
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          IMAGE_TAG="${GITHUB_SHA}"

          docker build -f src/Dockerfile -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" src
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"

          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Point Web App to new image
        if: ${{ steps.precheck.outputs.can_deploy == 'true' }}
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        run: |
          az webapp config container set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --container-image-name "$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            --container-registry-url "https://$ACR_LOGIN_SERVER"

      - name: Restart Web App
        if: ${{ steps.precheck.outputs.can_deploy == 'true' }}
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
        run: az webapp restart --resource-group "$RESOURCE_GROUP" --name "$WEBAPP_NAME"

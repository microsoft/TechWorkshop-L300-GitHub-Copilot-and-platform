name: Build and Deploy ZavaStorefront

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC authentication to Azure
  contents: read

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'dev' }}
  AZURE_LOCATION: westus3
  # Image tag pinned to the commit SHA for traceability
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build image in ACR (cloud-side, no local Docker)
    runs-on: ubuntu-latest

    outputs:
      acr_login_server: ${{ steps.acr-meta.outputs.login_server }}
      acr_name: ${{ steps.acr-meta.outputs.acr_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC / federated credential)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR name from AZD outputs
        id: acr-meta
        run: |
          ACR_NAME=$(az deployment group show \
            --resource-group rg-zava-${{ env.AZURE_ENV_NAME }} \
            --name main \
            --query "properties.outputs.acrName.value" \
            --output tsv 2>/dev/null || echo "")

          if [ -z "$ACR_NAME" ]; then
            echo "::error::Could not resolve ACR name. Run 'azd provision' first."
            exit 1
          fi

          LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer --output tsv)
          echo "acr_name=$ACR_NAME"     >> "$GITHUB_OUTPUT"
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Build and push image using ACR Tasks (no local Docker required)
        # az acr build streams the Docker build to Azure — no Docker daemon needed locally
        run: |
          az acr build \
            --registry "${{ steps.acr-meta.outputs.acr_name }}" \
            --image "zava-storefront:${{ env.IMAGE_TAG }}" \
            --image "zava-storefront:latest" \
            --file ./Dockerfile \
            ./src

  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ vars.AZURE_ENV_NAME || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC / federated credential)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: AZD environment setup
        run: |
          azd env new "${{ env.AZURE_ENV_NAME }}" --no-prompt || true
          azd env set AZURE_LOCATION "${{ env.AZURE_LOCATION }}"

      - name: Deploy application (update container image on App Service)
        run: |
          # Pass the newly built image to AZD so it updates the App Service linuxFxVersion
          azd env set containerImage \
            "${{ needs.build-and-push.outputs.acr_login_server }}/zava-storefront:${{ env.IMAGE_TAG }}"
          azd deploy --no-prompt
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}

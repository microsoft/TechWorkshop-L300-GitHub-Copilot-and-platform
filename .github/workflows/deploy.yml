name: Build and Deploy to Azure App Service

on:
    push:
        branches: [ main ]
        paths: [ 'src/**' ]
    pull_request:
        branches: [ '*' ]
    workflow_dispatch:

env:
  IMAGE_NAME: zava-storefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Log in to Azure Container Registry
      run: |
        az acr login --name ${{ vars.ACR_NAME }}
    
    - name: Build and push Docker image
      working-directory: ./src
      run: |
        docker build -t ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker tag ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
        docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
    
    - name: Deploy to Azure App Service
      run: |
        az webapp config container set \
          --name ${{ vars.WEBAPP_NAME }} \
          --resource-group ${{ vars.RESOURCE_GROUP }} \
          --docker-custom-image-name ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        
        az webapp restart \
          --name ${{ vars.WEBAPP_NAME }} \
          --resource-group ${{ vars.RESOURCE_GROUP }}

name: Build and Deploy

on:
pull_request:
   branches: [ main ]
workflow_dispatch:

env:
  IMAGE_NAME: zava-storefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}

      - name: Build and push container image
        run: |
          docker build -t ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_SERVICE_NAME }}
          images: ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

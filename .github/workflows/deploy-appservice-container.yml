name: Build and deploy container to App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/**
      - .github/workflows/deploy-appservice-container.yml
  pull_request:
   branches: [ '*' ]

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: zavastorefront

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        uses: azure/cli@v2
        with:
          inlineScript: |
            LOGIN_SERVER=$(az acr show --name "${{ vars.ACR_NAME }}" --query loginServer --output tsv)
            echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr login --name "${{ vars.ACR_NAME }}"
            docker build -t "${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" ./src
            docker push "${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Deploy image to App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config container set \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --name "${{ vars.AZURE_WEB_APP_NAME }}" \
              --container-image-name "${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"